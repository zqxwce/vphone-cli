name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, master]
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.destination }})
    runs-on: macos-15
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        destination:
          - "generic/platform=macOS"
          - "generic/platform=macOS,variant=Mac Catalyst"
          - "generic/platform=iOS"
          - "generic/platform=iOS Simulator"
          - "generic/platform=tvOS"
          - "generic/platform=tvOS Simulator"
          - "generic/platform=watchOS"
          - "generic/platform=watchOS Simulator"
          - "generic/platform=xrOS"
          - "generic/platform=xrOS Simulator"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Build
        env:
          CLANG_MODULE_CACHE_PATH: ${{ runner.temp }}/clang-module-cache
          SWIFTPM_MODULECACHE_OVERRIDE: ${{ runner.temp }}/clang-module-cache
        run: |
          set -o pipefail
          xcodebuild -scheme Capstone \
            -derivedDataPath "${{ runner.temp }}/derived-data" \
            -destination "${{ matrix.destination }}" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --disable-logging

  test:
    name: Test (macOS)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Run Tests
        env:
          CLANG_MODULE_CACHE_PATH: ${{ runner.temp }}/clang-module-cache
          SWIFTPM_MODULECACHE_OVERRIDE: ${{ runner.temp }}/clang-module-cache
        run: |
          set -o pipefail
          xcodebuild test -scheme Capstone \
            -derivedDataPath "${{ runner.temp }}/derived-data" \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --disable-logging
